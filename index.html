<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>席ガチャ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main>

    <h1>🎲 席ガチャ</h1>

    <section id="resultArea">
        <div id="result">
            抽選前です
        </div>

        <button id="drawButton">
            🎲 抽選する
        </button>
    </section>

    <section id="statusArea">
       <h2 class="statusHeader">
           <span>残席</span>
          <span id="seatSummary"></span>
      </h2>

        <div id="tableList">
            <!-- JavaScriptで表示 -->
        </div>
    </section>

<section id="buttons">
    <button id="undoButton">
        ↩ 抽選を1回戻す
    </button>
</section>

<section id="settings">
    <h2 id="settingsTitle">
        ⚙ 設定 ▼
    </h2>

    <div id="settingsBody">
        <div id="settingsList">
            <!-- JavaScriptで表示 -->
        </div>

        <button id="addTableButton">
            ＋ テーブル追加
        </button>


    <div id="settingsActionButtons">
        <button id="saveSettingsButton">
           ✓ テーブル変更を保存
        </button>

        <button id="cancelSettingsButton">
          ✕ テーブル変更をキャンセル
        </button>
    </div>


        <button id="resetButton">
            🔄 抽選結果をリセット
        </button>
    </div>
</section>


</main>

<script src="script.js"></script>

</body>
</html>
