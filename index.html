<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>席ガチャ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎲 席ガチャ</h1>
</header>

<main>

<section id="resultArea">
    <h2>抽選結果</h2>

    <div id="result">
        まだ抽選していません
    </div>

    <button id="drawButton">
        抽選する
    </button>
</section>

<hr>

<section id="statusArea">
    <h2>残席状況</h2>

    <div id="tableList">
        <!-- JavaScriptで表示 -->
    </div>
</section>

<hr>

<section id="buttons">

    <button id="undoButton">
        ↩ キャンセル
    </button>

    <button id="resetButton">
        🔄 リセット
    </button>

</section>

<hr>

<section id="settings">

<h2>設定</h2>

<div id="settingsList">
    <!-- JavaScriptで表示 -->
</div>

<button id="addTableButton">
＋ テーブル追加
</button>

<button id="saveButton">
💾 設定を保存
</button>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
